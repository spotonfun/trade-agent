version: "3.8"
services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # usuń jeśli brak GPU

  agent:
    build: .
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./sygnaly.jsonl:/app/sygnaly.jsonl

volumes:
  ollama_data:
